<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Moving - Quick Quote</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Password Protection Overlay -->
    <div id="login-overlay" class="login-overlay">
        <div class="login-card card">
            <div class="logo" style="justify-content: center; margin-bottom: 20px;">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
                <h1 style="font-size: 24px;">Apex Secure</h1>
            </div>
            <p style="text-align: center; margin-bottom: 24px; color: var(--text-muted);">Enter password to access the Quote Engine</p>
            <input type="password" id="app-password" placeholder="Password" style="width: 100%; margin-bottom: 16px; padding: 12px;">
            <button id="login-btn" class="btn-primary" style="width: 100%;">Unlock System</button>
            <p id="login-error" class="error-text hidden" style="margin-top: 12px; text-align: center; color: #ef4444; font-size: 13px;">Incorrect password. Access denied.</p>
        </div>
    </div>

    <div class="app-container hidden" id="main-app">
        <header class="header">
            <div class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="1" y="3" width="15" height="13"></rect>
                    <polygon points="16 8 20 8 23 11 23 16 16 16 16 8"></polygon>
                    <circle cx="5.5" cy="18.5" r="2.5"></circle>
                    <circle cx="18.5" cy="18.5" r="2.5"></circle>
                </svg>
                <h1>Apex Quote</h1>
            </div>
            <p class="subtitle">Smart quoting for Dandenong</p>
        </header>

        <main class="main-content">
            <!-- ... existing content ... -->
        </main>
        
        <footer class="branding-footer">
            <p>© 2026 Apex Quote Engine. All Rights Reserved.</p>
            <p>Proprietary software developed by <strong>Faiza</strong></p>
        </footer>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
